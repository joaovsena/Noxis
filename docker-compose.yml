services:
  redis:
    image: redis:7-alpine
    container_name: noxis-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - noxis_redis_data:/data
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: noxis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: noxis
    ports:
      - "5432:5432"
    volumes:
      - noxis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noxis"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: noxis-app:local
    container_name: noxis-app
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:1234@db:5432/noxis?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      PRISMA_DB_PUSH: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    init: true
    stop_grace_period: 10s
    restart: "no"

  engine-go:
    profiles: ["poc"]
    build:
      context: ./engine-go
      dockerfile: Dockerfile
    image: noxis-engine-go:local
    container_name: noxis-engine-go
    environment:
      ENGINE_PORT: 8088
    ports:
      - "8088:8088"
    restart: unless-stopped

volumes:
  noxis_postgres_data:
  noxis_redis_data:
